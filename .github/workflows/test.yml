name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths: ['src/**', 'test/**']

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeLaGuardo/setup-clojure@13
        with:
          cli: latest

      - uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: m2-${{ hashFiles('deps.edn') }}

      - name: Run tests
        run: clojure -M:test
